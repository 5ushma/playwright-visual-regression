name: Visual Regression

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline snapshots'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Pin Playwright version to match package.json
  PLAYWRIGHT_VERSION: '1.45.0'

jobs:
  # ─── Visual Regression ─────────────────────────────────────────────────────
  visual-regression:
    name: Visual Regression (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium-desktop
          - firefox-desktop
          - webkit-desktop
          - iphone-15
          - chromium-dark

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch LFS for snapshot storage (if using Git LFS)
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project == 'iphone-15' && 'webkit' || matrix.project == 'webkit-desktop' && 'webkit' || matrix.project == 'firefox-desktop' && 'firefox' || 'chromium' }}

      - name: Download snapshot baselines
        uses: actions/cache@v4
        with:
          path: snapshots
          key: snapshots-${{ matrix.project }}-${{ hashFiles('snapshots/**') }}
          restore-keys: |
            snapshots-${{ matrix.project }}-

      - name: Start application
        run: |
          npm run build
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          NODE_ENV: test

      - name: Run visual regression tests
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            ${{ github.event.inputs.update_snapshots == 'true' && '--update-snapshots' || '' }}
        env:
          BASE_URL: http://localhost:3000
          CI: true
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.project }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload snapshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot-diffs-${{ matrix.project }}
          path: test-results/diffs/
          retention-days: 14

      - name: Update snapshot cache
        if: github.event.inputs.update_snapshots == 'true' && success()
        uses: actions/cache@v4
        with:
          path: snapshots
          key: snapshots-${{ matrix.project }}-${{ hashFiles('snapshots/**') }}

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'test-results/vr-summary.md';

            if (!fs.existsSync(summaryPath)) {
              console.log('No summary file found');
              return;
            }

            const summary = fs.readFileSync(summaryPath, 'utf8');
            const body = `### 🎨 Visual Regression — \`${{ matrix.project }}\`\n\n${summary}`;

            // Find existing comment for this project
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `<!-- vr-${{ matrix.project }} -->`;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }

  # ─── Approve Snapshots (manual trigger only) ────────────────────────────────
  approve-snapshots:
    name: Approve New Snapshots
    runs-on: ubuntu-latest
    needs: visual-regression
    if: github.event.inputs.update_snapshots == 'true' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download updated snapshots
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Commit approved snapshots
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add snapshots/
          git diff --staged --quiet || git commit -m 'chore: update visual regression baselines [skip ci]'
          git push